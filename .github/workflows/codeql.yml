name: CodeQL

# Static analysis (SAST) of the Python code. Trivy in the Security job is SCA
# (dependency CVEs); CodeQL analyzes our own code for injection, unsafe
# deserialization, path traversal, etc. Free on public repos.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly sweep (Mondays 04:27 UTC) catches advisories published after merge.
    - cron: "27 4 * * 1"

# CodeQL uploads results via the security-events API, which needs write.
permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Only cancel superseded PR runs; let push (main) runs always finish.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: python
          # Broader security coverage than the default suite.
          queries: security-extended

      # No build step: Python is interpreted, so CodeQL analyzes the source
      # directly (no autobuild needed).
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:python"
